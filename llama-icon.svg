<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- The Daily Llama icon: stylized llama head in teal -->
  <circle cx="32" cy="32" r="30" fill="#0f1117" stroke="#14b8a6" stroke-width="2"/>
  <!-- Ears -->
  <ellipse cx="18" cy="14" rx="5" ry="8" fill="#1a1d2e" stroke="#14b8a6" stroke-width="1.5" transform="rotate(-15 18 14)"/>
  <ellipse cx="46" cy="14" rx="5" ry="8" fill="#1a1d2e" stroke="#14b8a6" stroke-width="1.5" transform="rotate(15 46 14)"/>
  <!-- Head -->
  <ellipse cx="32" cy="30" rx="16" ry="14" fill="#1a1d2e" stroke="#14b8a6" stroke-width="1.5"/>
  <!-- Snout -->
  <ellipse cx="32" cy="38" rx="8" ry="6" fill="#161822" stroke="#14b8a6" stroke-width="1"/>
  <!-- Eyes -->
  <circle cx="25" cy="28" r="2.5" fill="#14b8a6"/>
  <circle cx="39" cy="28" r="2.5" fill="#14b8a6"/>
  <!-- Nostrils -->
  <circle cx="29" cy="38" r="1" fill="#14b8a6"/>
  <circle cx="35" cy="38" r="1" fill="#14b8a6"/>
  <!-- Mouth line -->
  <path d="M29 41 Q32 44 35 41" stroke="#14b8a6" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
